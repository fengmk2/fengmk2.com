name: CI
on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

# Latest push wins per branch: a newer commit cancels an in-flight run so an
# older staging deploy can never overtake a newer one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      # Restore the vite-task result cache so unchanged builds replay instead
      # of rebuilding. The primary key is unique per run (entries are
      # immutable); restore-keys falls back to the newest compatible entry.
      - uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: vite-task-${{ runner.os }}-${{ runner.arch }}-
      # Build first (via the cacheable ci-build task): it generates
      # .void/routes.d.ts and queues.d.ts, which the generated
      # .void/tsconfig.json references. Since vite-plus 0.2.2, vp check fails
      # on the invalid tsconfig when those files are missing (vp config alone
      # does not create them on a fresh checkout). A cache replay restores
      # them from the archived task outputs.
      - run: vp run ci-build
      - run: vp check
      - run: vp test run
      - uses: actions/cache/save@v6
        if: always()
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}

  staging-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Lets the CLI mint a GitHub OIDC token and exchange it for a
      # short-lived project-scoped deploy token; no VOID_TOKEN secret needed.
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: vpx void deploy
        env:
          VOID_PROJECT: fengmk2-staging

  # Staging deploy is live, so promote the exact same commit to production:
  # fast-forward master and let the Void GitHub App deploy it. --ff-only means
  # a diverged master (e.g. a direct commit) fails loudly instead of merging.
  promote:
    needs: staging-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
      - name: Fast-forward master to the staged commit
        run: |
          git fetch origin ${{ github.sha }}
          git merge --ff-only ${{ github.sha }}
          git push origin master
